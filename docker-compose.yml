services:
  redis:
    image: redis:7-alpine
    container_name: redis_broker
    profiles: [pipeline, adapters]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory-policy noeviction --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mongodb
    profiles: [pipeline, adapters]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--quiet"]
    logging:
      driver: "none"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    profiles: [pipeline]
    ports:
      - "5540:5540"
    depends_on:
      - redis

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    profiles: [pipeline, cli]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: [pipeline, cli]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama_pull
    profiles: [pipeline, cli]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    restart: "no"

  obsidian_adapter:
    build: .
    container_name: obsidian_adapter
    profiles: [adapters]
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://admin:secretpassword@mongodb:27017/
      MONGODB_DB_NAME: rag_pipeline
      CELERY_BROKER_URL: redis://redis:6379/0
      OBSIDIAN_VAULT_PATH: /vault
    volumes:
      - ${VAULT_HOST_PATH:?Set VAULT_HOST_PATH to your Obsidian vault directory}:/vault:ro

  embedding_manager:
    build: .
    container_name: embedding_manager
    command: python -m embedding_manager
    restart: on-failure
    profiles: [pipeline]
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      MONGODB_URI: mongodb://admin:secretpassword@mongodb:27017/
      MONGODB_DB_NAME: rag_pipeline
      CELERY_BROKER_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333

  embedding_worker:
    build: .
    container_name: embedding_worker
    command: python -m embedding_worker
    restart: on-failure
    profiles: [pipeline]
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      MONGODB_URI: mongodb://admin:secretpassword@mongodb:27017/
      MONGODB_DB_NAME: rag_pipeline
      CELERY_BROKER_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL_ID: nomic-embed-text

volumes:
  redis_data:
  mongo_data:
  qdrant_data:
  ollama_data:
