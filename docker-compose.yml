version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis_broker
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory-policy noeviction --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 3s
      retries: 5

  obsidian_adapter:
    build: .
    container_name: obsidian_adapter
    profiles: [adapters]
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://admin:secretpassword@mongodb:27017/
      MONGODB_DB_NAME: rag_pipeline
      CELERY_BROKER_URL: redis://redis:6379/0
      OBSIDIAN_VAULT_PATH: /vault
    volumes:
      - ${VAULT_HOST_PATH:?Set VAULT_HOST_PATH to your Obsidian vault directory}:/vault:ro

  embedding_manager:
    build: .
    container_name: embedding_manager
    command: python -m embedding_manager
    profiles: [pipeline]
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://admin:secretpassword@mongodb:27017/
      MONGODB_DB_NAME: rag_pipeline
      CELERY_BROKER_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000

  embedding_worker:
    build: .
    container_name: embedding_worker
    command: python -m embedding_worker
    profiles: [pipeline]
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://admin:secretpassword@mongodb:27017/
      MONGODB_DB_NAME: rag_pipeline
      CELERY_BROKER_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000

volumes:
  redis_data:
  mongo_data:
  chroma_data:
